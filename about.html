<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>跳转中...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(ellipse at center, #0f0c29, #302b63, #24243e);
      font-family: 'Orbitron', sans-serif;
      color: #00ffe7;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    h1 {
      font-size: 2.2em;
      text-shadow: 0 0 10px #00ffe7, 0 0 20px #00ffe7;
      margin-bottom: 20px;
    }

    a {
      color: #00ffe7;
      text-decoration: none;
      border-bottom: 1px dashed #00ffe7;
      font-size: 1.2em;
    }

    a:hover {
      text-shadow: 0 0 5px #00ffe7;
    }

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');
  </style>
</head>
<body>
  <h1>正在进入未来世界...</h1>
  <p>如果没有自动跳转，请点击 <a href="https://awei.nyc.mn" target="_blank">这里</a>。</p>

  <script>
    // 尝试触发跳转（尽可能早）
    setTimeout(() => {
      const newWindow = window.open("https://awei.nyc.mn", "_blank");
      if (!newWindow) {
        console.warn("浏览器拦截了弹窗，需要用户手动点击链接。");
      }
    }, 100); // 等个 100ms 增加成功率
  </script>
</body>
</html>
