<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>正在进入未来世界...</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #0f0c29, #302b63, #24243e);
      font-family: 'Orbitron', sans-serif;
      color: #00ffe7;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    h1 {
      font-size: 2.2em;
      text-shadow: 0 0 10px #00ffe7, 0 0 20px #00ffe7;
      margin-bottom: 20px;
    }

    a, .home-button {
      color: #00ffe7;
      font-size: 1.2em;
      text-decoration: none;
      border: 1px dashed #00ffe7;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 8px;
      transition: all 0.3s ease;
      display: inline-block;
    }

    a:hover, .home-button:hover {
      background: #00ffe7;
      color: #000;
      box-shadow: 0 0 15px #00ffe7;
    }

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');
  </style>
</head>
<body>
  <h1>正在进入未来世界...</h1>
  <p>
    如果没有自动跳转，请点击
    <a id="jump" href="https://awei.nyc.mn" target="_blank">这里进入</a>
  </p>
  <a class="home-button" href="/">← 返回首页</a>

  <script>
    window.onload = function () {
      const link = document.getElementById('jump');
      if (link) {
        const clickEvent = new MouseEvent('click', {
          bubbles: true,
          cancelable: true,
          view: window
        });
        link.dispatchEvent(clickEvent);
      }
    }
  </script>
</body>
</html>
